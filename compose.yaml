services:
  db:
    image: postgres
    restart: always
    ports:
      # 5433, not 5432 — the nextjs-fullstack-template sibling project already
      # binds 5432 for its own local Postgres.
      - 5433:5432
    environment:
      POSTGRES_USER: root
      POSTGRES_PASSWORD: mysecretpassword
      POSTGRES_DB: local
    volumes:
      - pgdata:/var/lib/postgresql
volumes:
  pgdata:
